<!DOCTYPE html>
<html>

<head>
    <title>Campus Route Mapping Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1557b0;
        }

        .danger {
            background: #ea4335;
        }

        .danger:hover {
            background: #d32f2f;
        }
    </style>
</head>

<body>

    <div id="controls">
        <h3>Point Mapper</h3>
        <button onclick="exportGraph()">📥 Export to JSON</button>
        <button class="danger" onclick="clearMap()">🗑️ Clear All</button>
        <p style="margin-top: 10px; font-size: 14px; max-width: 250px;">Click anywhere on the map to add a walkable
            point. Make sure points are placed close to each other along paths.</p>
    </div>

    <div id="map"></div>

    <script src="admin.js"></script>

</body>

</html>
