<!DOCTYPE html>
<html>

<head>
    <title>3D Web Navigation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DeviceOrientationControls.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <video id="camera-feed" autoplay playsinline></video>

    <!-- Main Menu Overlay -->
    <div id="menu-overlay" class="overlay-container">
        <!-- Categories View -->
        <div id="categories-view">
            <h2>Select Destination Category</h2>
            <div class="menu-grid">
                <button class="menu-btn" onclick="showLocations('Classrooms')">🏫 Classrooms</button>
                <button class="menu-btn" onclick="showLocations('Labs')">🔬 Labs</button>
                <button class="menu-btn" onclick="showLocations('Offices')">🏢 Offices</button>
                <button class="menu-btn" onclick="showLocations('Cafeteria')">🍔 Cafeteria</button>
                <button class="menu-btn" onclick="showLocations('Restrooms')">🚻 Restrooms</button>
            </div>
        </div>

        <!-- Locations View (Hidden initially) -->
        <div id="locations-view" style="display: none;">
            <button class="back-btn" onclick="showCategories()">← Back</button>
            <h2 id="category-title">Locations</h2>
            <div id="locations-list" class="menu-list">
                <!-- Dynamically populated buttons go here -->
            </div>
        </div>
    </div>

    <div id="ui-overlay" style="display: none;">
        <!-- Top Navigation Header -->
        <div id="top-nav-panel">
            <div class="nav-icon-container" style="width: 60px; height: 60px;">
                <span id="nav-arrow" style="font-size: 40px; line-height: 1;">↑</span>
            </div>
            <div class="nav-text-container">
                <h3 id="instruction">Waiting for GPS...</h3>
                <p id="distance">--</p>
            </div>
        </div>

        <!-- Middle Tools -->
        <div id="middle-tools">
            <button id="like-btn" onclick="toggleLike()">❤️ Like</button>
            <p id="current-coords"></p>
        </div>

        <!-- Bottom Sheet -->
        <div id="bottom-sheet">
            <div class="sheet-handle"></div>
            <h2 id="ar-destination-title" class="destination-title">Target Destination</h2>
            <p class="destination-subtitle">Markerless Navigation</p>
            <button class="menu-btn" style="background: #ff4757; margin-top: 10px;" onclick="stopAR()">
                End Navigation
            </button>
        </div>
    </div>

    <div id="container"></div>

    <script src="script.js"></script>

</body>

</html>
