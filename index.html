<!DOCTYPE html>
<html>

<head>
    <title>3D Web Navigation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DeviceOrientationControls.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <video id="camera-feed" autoplay playsinline></video>

    <div id="start-overlay">
        <h2>Advanced AR Navigation</h2>
        <p>This experience requires access to your camera, GPS, and device orientation.</p>
        <button id="start-btn" onclick="startAR()">Start AR Mode</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <!-- Top Navigation Header -->
        <div id="top-nav-panel">
            <div class="nav-icon-container" style="width: 60px; height: 60px;">
                <span id="nav-arrow" style="font-size: 40px; line-height: 1;">↑</span>
            </div>
            <div class="nav-text-container">
                <h3 id="instruction">Waiting for GPS...</h3>
                <p id="distance">--</p>
            </div>
        </div>

        <!-- Middle Tools -->
        <div id="middle-tools">
            <button id="like-btn" onclick="toggleLike()">❤️ Like</button>
            <p id="current-coords"></p>
        </div>

        <!-- Bottom Sheet -->
        <div id="bottom-sheet">
            <div class="sheet-handle"></div>
            <h2 class="destination-title">Target Destination</h2>
            <p class="destination-subtitle">Markerless Navigation</p>
            <button class="primary-btn" onclick="setDestination(10.641123, 77.029058)">
                Start Directions
            </button>
        </div>
    </div>

    <div id="container"></div>

    <script src="script.js"></script>

</body>

</html>
