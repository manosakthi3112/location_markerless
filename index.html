<!DOCTYPE html>
<html>

<head>
    <title>3D Web Navigation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DeviceOrientationControls.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <video id="camera-feed" autoplay playsinline></video>

    <div id="start-overlay">
        <h2>Advanced AR Navigation</h2>
        <p>This experience requires access to your camera, GPS, and device orientation.</p>
        <button id="start-btn" onclick="startAR()">Start AR Mode</button>
    </div>

    <div id="ui-overlay" style="display: none;">
        <h2>Smart 3D Direction System</h2>

        <button onclick="setDestination(10.6412815, 77.00289369)">
            Go to Target Location
        </button>
        <button id="like-btn" onclick="toggleLike()">❤️ Like</button>

        <p id="distance"></p>
        <h3 id="instruction"
            style="color: #00ff00; font-size: 32px; margin-top: 15px; font-weight: bold; text-shadow: 2px 3px 5px rgba(0,0,0,0.9);">
            Waiting for GPS...</h3>
    </div>

    <div id="container"></div>

    <script src="script.js"></script>

</body>

</html>
